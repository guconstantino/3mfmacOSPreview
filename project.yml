name: MF3Preview
options:
  bundleIdPrefix: com.guconstantino
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    # --- Signing ---
    # Free Apple ID (Personal Team) signs locally. Open the project in Xcode and
    # pick your Personal Team under Signing & Capabilities for BOTH targets.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    # No notarization (requires a paid account) — see DECISIONS.md.

targets:
  MF3Preview:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Sources/ThumbnailCore
    dependencies:
      - target: PreviewExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: MF3Preview
        PRODUCT_BUNDLE_IDENTIFIER: com.guconstantino.MF3Preview
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/App.entitlements
        COMBINE_HIDPI_IMAGES: YES

  PreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - Sources/PreviewExtension
      - Sources/ThumbnailCore
    settings:
      base:
        PRODUCT_NAME: PreviewExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.guconstantino.MF3Preview.PreviewExtension
        INFOPLIST_FILE: Sources/PreviewExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PreviewExtension/PreviewExtension.entitlements

schemes:
  MF3Preview:
    build:
      targets:
        MF3Preview: all
    run:
      config: Debug
    archive:
      config: Release
